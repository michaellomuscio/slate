<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Slate app icon, Lomuscio Labs brand (v0.3.0): a film clapperboard (the app's core
       metaphor — the clapboard that syncs picture + sound) on a near-black squircle. Brand
       rule: black/white dominate, purple (#7B2FBE) is the single accent and stays well under
       20% of the composition — here it's only the clap-stick stripes + hinge. Source of truth;
       rasterized by branding/make-icon.sh into the AppIcon asset catalog. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1526"/>   <!-- faint purple-black at top -->
      <stop offset="0.55" stop-color="#101018"/>
      <stop offset="1" stop-color="#0A0A0B"/>    <!-- brand Black -->
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.22" r="0.85">
      <stop offset="0" stop-color="#7B2FBE" stop-opacity="0.20"/>  <!-- subtle purple halo -->
      <stop offset="1" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="stickclip">
      <rect x="270" y="312" width="484" height="116" rx="26"/>
    </clipPath>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dy="20" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.50"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background squircle: near-black, brand-dominant -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#glow)"/>

  <!-- clapperboard -->
  <g filter="url(#shadow)">
    <!-- board body: off-white (brand White), high contrast on the black squircle -->
    <rect x="270" y="452" width="484" height="260" rx="40" fill="#F4F4F6"/>
    <!-- faint slate write-on lines -->
    <line x1="322" y1="556" x2="702" y2="556" stroke="#AEB4C2" stroke-width="9" stroke-linecap="round"/>
    <line x1="322" y1="628" x2="596" y2="628" stroke="#C4C9D4" stroke-width="9" stroke-linecap="round"/>

    <!-- clap stick: white base with PURPLE diagonal stripes (the single brand accent) -->
    <g clip-path="url(#stickclip)">
      <rect x="270" y="312" width="484" height="116" fill="#FFFFFF"/>
      <g fill="#7B2FBE">
        <polygon points="230,428 278,428 342,312 294,312"/>
        <polygon points="326,428 374,428 438,312 390,312"/>
        <polygon points="422,428 470,428 534,312 486,312"/>
        <polygon points="518,428 566,428 630,312 582,312"/>
        <polygon points="614,428 662,428 726,312 678,312"/>
        <polygon points="710,428 758,428 822,312 774,312"/>
      </g>
    </g>
    <!-- hinge knob where the stick meets the board: purple accent -->
    <circle cx="300" cy="440" r="16" fill="#7B2FBE"/>
  </g>
</svg>
