name: Slate
options:
  bundleIdPrefix: com.lomusciolabs
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode (compiler is 6.3) — avoids strict-concurrency churn on v1
    MARKETING_VERSION: "0.4.2"
    CURRENT_PROJECT_VERSION: "10"
    PRODUCT_BUNDLE_IDENTIFIER: com.lomusciolabs.slate
    # Sign EVERY configuration (Debug included) with the stable Developer ID identity, not
    # ad-hoc. macOS keys Screen Recording / Accessibility grants to the signing identity's
    # Designated Requirement; an ad-hoc Debug build gets a NEW identity each rebuild, so macOS
    # "forgets" the grant every time (the recurring re-prompt bug). Manual Developer ID gives
    # one stable identity shared by every build → grant once, persists forever.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: MICHAEL FRANCIS LOMUSCIO III (C9562TBW66)"
    DEVELOPMENT_TEAM: C9562TBW66
    ENABLE_HARDENED_RUNTIME: YES    # required for notarization; needs NO extra entitlements for
                                    # Slate (ScreenCaptureKit + Accessibility are TCC-gated, camera/
                                    # mic ride the Info.plist usage strings, no JIT/dylib injection)
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # Slate/Assets.xcassets/AppIcon.appiconset
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor   # Lomuscio Labs purple #7B2FBE

targets:
  Slate:
    type: application
    platform: macOS
    sources:
      - path: Slate
    entitlements:
      path: Slate/Slate.entitlements
      properties:
        # Unsandboxed: global event monitoring (clicks) + arbitrary folder writes need this.
        # For Mac App Store you'd sandbox; for Developer-ID notarized distribution, unsandboxed is fine.
        com.apple.security.app-sandbox: false
        # Hardened Runtime REQUIRES these to access camera/mic — without them the request
        # silently fails (no prompt, app never appears in the Privacy list). The Info.plist
        # usage strings alone are not enough once hardened runtime is on.
        com.apple.security.device.camera: true
        com.apple.security.device.audio-input: true
    info:
      path: Slate/Info.generated.plist
      properties:
        CFBundleName: Slate
        CFBundleDisplayName: Slate
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.video
        NSHighResolutionCapable: true
        NSCameraUsageDescription: "Slate records your camera as a separate video track so your screencasts can show your face."
        NSMicrophoneUsageDescription: "Slate records your microphone as a separate, uncompressed audio track for clean transcription and editing."
        NSHumanReadableCopyright: "© 2026 Michael Lomuscio / Lomuscio Labs"
